spring.application.name=hotel-management-backend
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hm_pbl?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=never
spring.jackson.time-zone=Asia/Kolkata

app.cors.allowed-origin=http://localhost:4200
